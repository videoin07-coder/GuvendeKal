pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

apply from: new File(
    ["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(),
    "../native_modules.gradle"
)
applyNativeModulesSettingsGradle(settings)

rootProject.name = 'GuvendeKal'

include ':app'

includeBuild('../node_modules/@react-native/gradle-plugin')
